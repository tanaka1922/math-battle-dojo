<!DOCTYPE html>
<!--
  数学バトル道場 v1.0
  ====================
  【Vercel デプロイ方法】
  1. このファイルを index.html にリネーム（または vercel.json でルート指定）
  2. Vercel CLI: vercel --prod  /  もしくは GitHub リポジトリに push して連携

  【動画差し替え方法（Veo生成動画が準備できたら）】
  1. videos/ フォルダに各状態のmp4を配置
  2. switchBgVideo() を <video> ソース切り替えに変更
-->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<meta name="description" content="中学数学 中1〜中2 全分野をゲーム感覚で征服！ボスを倒してランクアップ。">
<title>数学バトル道場</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0e1a;
    --panel: #111827;
    --border: #1e3a5f;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --accent3: #7c3aed;
    --gold: #ffd700;
    --green: #00ff88;
    --red: #ff4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: -webkit-fill-available; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* 全体背景グラデーション */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,212,255,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(124,58,237,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== 状態別 CSS 背景 (全画面・固定) ===== */
  /* Veo動画が準備できたら <video> 要素に差し替え予定 */
  .scene-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -1;
    transition: filter 0.6s ease;
  }
  .scene-bg-overlay {
    position: absolute;
    inset: 0;
    background: rgba(6, 10, 20, 0.72);
    pointer-events: none;
  }

  /* タイトル・メニュー：深宇宙ブルー + パープル */
  .scene-bg.state-title {
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0,100,255,0.20) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 70%, rgba(120,40,220,0.18) 0%, transparent 55%),
      linear-gradient(160deg, #06091a 0%, #0a0e24 50%, #12072a 100%);
    animation: bgFloat 12s ease-in-out infinite alternate;
  }

  /* 問題中：集中・ダークシアン */
  .scene-bg.state-quiz {
    background:
      radial-gradient(ellipse at 60% 20%, rgba(0,160,200,0.14) 0%, transparent 50%),
      linear-gradient(160deg, #04080e 0%, #060c18 50%, #04080e 100%);
    animation: bgFloat 10s ease-in-out infinite alternate;
  }

  /* 正解：エメラルドグリーン */
  .scene-bg.state-correct {
    background:
      radial-gradient(ellipse at 50% 40%, rgba(0,220,100,0.30) 0%, transparent 60%),
      linear-gradient(160deg, #020e04 0%, #041408 50%, #020e04 100%);
    animation: bgPop 0.5s ease-out, bgFloat 6s 0.5s ease-in-out infinite alternate;
  }
  .scene-bg.state-correct .scene-bg-overlay { background: rgba(4, 18, 8, 0.65); }

  /* 不正解：クリムゾンレッド */
  .scene-bg.state-wrong {
    background:
      radial-gradient(ellipse at 50% 40%, rgba(220,30,30,0.30) 0%, transparent 60%),
      linear-gradient(160deg, #0e0202 0%, #180404 50%, #0e0202 100%);
    animation: bgShake 0.4s ease-out, bgFloat 6s 0.4s ease-in-out infinite alternate;
  }
  .scene-bg.state-wrong .scene-bg-overlay { background: rgba(20, 4, 4, 0.65); }

  /* クリア・ボス撃破：ゴールデン */
  .scene-bg.state-clear {
    background:
      radial-gradient(ellipse at 30% 30%, rgba(255,200,0,0.22) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 70%, rgba(255,100,0,0.16) 0%, transparent 50%),
      linear-gradient(160deg, #0e0c02 0%, #1a1604 50%, #0e0c02 100%);
    animation: bgFloat 5s ease-in-out infinite alternate;
  }
  .scene-bg.state-clear .scene-bg-overlay { background: rgba(16, 14, 2, 0.66); }

  @keyframes bgFloat {
    0%   { filter: brightness(1); }
    100% { filter: brightness(1.15); }
  }
  @keyframes bgPop {
    0%   { filter: brightness(2.2); }
    60%  { filter: brightness(1.4); }
    100% { filter: brightness(1); }
  }
  @keyframes bgShake {
    0%,100% { transform: translateX(0); }
    20%     { transform: translateX(-6px); }
    40%     { transform: translateX(6px); }
    60%     { transform: translateX(-4px); }
    80%     { transform: translateX(4px); }
  }

  /* ===== LAYOUT ===== */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 16px 16px env(safe-area-inset-bottom, 16px);
    padding-top: max(16px, env(safe-area-inset-top, 16px));
  }

  /* ===== HEADER ===== */
  .hdr {
    text-align: center;
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .hdr h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.3rem, 5vw, 1.9rem);
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
    letter-spacing: 2px;
  }
  .hdr p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

  .mute-btn {
    position: fixed;
    top: max(12px, env(safe-area-inset-top, 12px));
    right: max(12px, env(safe-area-inset-right, 12px));
    z-index: 100;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    min-height: 36px;
    touch-action: manipulation;
  }
  .mute-btn:hover { border-color: var(--accent); }
  .mute-btn:active { transform: scale(0.96); }

  .back-btn {
    position: fixed;
    top: max(12px, env(safe-area-inset-top, 12px));
    left: max(12px, env(safe-area-inset-left, 12px));
    z-index: 100;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.8rem;
    min-height: 36px;
    touch-action: manipulation;
    display: none;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--text); }
  .back-btn:active { transform: scale(0.96); }

  /* ===== STATS BAR ===== */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-box .label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-box .val { font-family: 'Orbitron', sans-serif; font-size: 1.05rem; font-weight: 700; margin-top: 2px; }
  .stat-xp .val { color: var(--gold); }
  .stat-rank .val { color: var(--accent); font-size: 0.68rem; }
  .stat-combo .val { color: var(--accent2); }

  /* XP BAR */
  .xp-bar-wrap { margin-bottom: 16px; }
  .xp-bar-bg { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; height: 10px; overflow: hidden; }
  .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent3), var(--accent)); border-radius: 8px; transition: width 0.4s ease; }
  .xp-bar-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  /* ===== BOSS AREA ===== */
  .boss-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .boss-emoji { font-size: 3.5rem; display: block; animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  .boss-name { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--accent2); margin: 6px 0 4px; }
  .boss-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
  .boss-hp-bg { background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 8px; height: 14px; overflow: hidden; }
  .boss-hp-fill { height: 100%; background: linear-gradient(90deg, #ff4444, #ff6b35); border-radius: 8px; transition: width 0.5s ease; }
  .boss-hp-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

  /* ===== QUIZ AREA ===== */
  .quiz-area {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .q-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .q-cat {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
  }
  .q-num { font-size: 0.75rem; color: var(--muted); }
  .q-text {
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    line-height: 1.75;
    margin-bottom: 6px;
    min-height: 56px;
    white-space: pre-wrap;
  }
  .q-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 16px; }

  .ans-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .ans-input {
    flex: 1;
    background: #0f1829;
    border: 2px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: 12px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border 0.2s;
    min-height: 48px;
  }
  .ans-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.1); }
  .ans-input.ok { border-color: var(--green); background: rgba(0,255,136,0.05); }
  .ans-input.ng { border-color: var(--red); background: rgba(255,68,68,0.05); }

  .btn {
    padding: 13px 20px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.9rem;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    min-height: 48px;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--accent3), var(--accent)); color: white; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,212,255,0.3); }
  .btn-secondary { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); }
  .btn-next {
    background: linear-gradient(135deg, #059669, var(--green));
    color: #003322;
    width: 100%;
    margin-top: 8px;
    font-size: 0.95rem;
  }
  .btn-next:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,255,136,0.2); }

  /* HINT */
  .hint-area { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .hint-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
    min-height: 36px;
    touch-action: manipulation;
  }
  .hint-btn:hover { border-color: var(--gold); color: var(--gold); }
  .hint-btn:active { transform: scale(0.97); }
  .hint-text {
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 10px;
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    font-size: 0.85rem;
    color: var(--gold);
    display: none;
    line-height: 1.6;
  }
  .hint-text.show { display: block; }

  /* FEEDBACK */
  .feedback {
    padding: 12px 16px;
    border-radius: 12px;
    margin-top: 10px;
    font-size: 0.9rem;
    display: none;
    line-height: 1.6;
  }
  .feedback.ok { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3); color: var(--green); display: block; }
  .feedback.ng { background: rgba(255,68,68,0.08); border: 1px solid rgba(255,68,68,0.3); color: #ff8888; display: block; }
  .feedback .exp { color: var(--muted); font-size: 0.8rem; margin-top: 6px; }

  /* COMBO FLASH */
  .combo-flash {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.8);
    pointer-events: none;
    opacity: 0;
    z-index: 200;
    white-space: nowrap;
  }
  @keyframes comboAnim {
    0%   { opacity:1; transform:translate(-50%,-60%) scale(1.3); }
    80%  { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-70%) scale(0.9); }
  }

  /* PROGRESS */
  .prog-wrap { margin-bottom: 12px; }
  .prog-bg { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--gold)); border-radius: 6px; transition: width 0.3s ease; }
  .prog-label { font-size: 0.7rem; color: var(--muted); margin-top: 4px; text-align: right; }

  /* ===== MENU SCREEN ===== */
  #menuScreen { padding: 0; }

  .menu-hero {
    text-align: center;
    padding: 4px 0 20px;
  }
  .menu-hero h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.1rem, 4vw, 1.4rem);
    color: var(--accent);
    margin-bottom: 6px;
  }
  .menu-hero p { color: var(--muted); font-size: 0.85rem; }

  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .menu-card {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    min-height: 80px;
  }
  .menu-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,212,255,0.15); }
  .menu-card:active { transform: scale(0.97); }
  .menu-card.active { border-color: var(--accent); background: rgba(0,212,255,0.08); }
  .menu-card .mc-emoji { font-size: 1.8rem; margin-bottom: 4px; }
  .menu-card .mc-name { font-weight: 700; font-size: 0.85rem; margin-bottom: 3px; }
  .menu-card .mc-cnt { font-size: 0.72rem; color: var(--muted); }

  .btn-start {
    width: 100%;
    padding: 18px;
    font-size: 1.1rem;
    font-family: 'Orbitron', sans-serif;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 700;
    letter-spacing: 2px;
    box-shadow: 0 4px 24px rgba(0,212,255,0.3);
    transition: all 0.2s;
    min-height: 56px;
    touch-action: manipulation;
  }
  .btn-start:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,212,255,0.4); }
  .btn-start:active { transform: scale(0.98); }

  .mode-select { display: flex; gap: 8px; margin-bottom: 16px; }
  .mode-btn {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.8rem;
    transition: all 0.2s;
    text-align: center;
    min-height: 44px;
    touch-action: manipulation;
  }
  .mode-btn.active { border-color: var(--accent2); background: rgba(255,107,53,0.1); color: var(--accent2); }
  .mode-btn:active { transform: scale(0.97); }

  .sel-label {
    margin-bottom: 12px;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }

  /* ===== SUMMARY SCREEN ===== */
  .summary-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .summary-emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
  .summary-score {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 10vw, 3.5rem);
    color: var(--gold);
    font-weight: 900;
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
  }
  .summary-label { color: var(--muted); font-size: 0.85rem; margin: 6px 0 16px; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .result-item { padding: 10px 6px; background: rgba(255,255,255,0.03); border-radius: 10px; }
  .result-item .ri-val { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; }
  .result-item .ri-label { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

  .weak-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
    text-align: left;
  }
  .weak-list h3 { font-size: 0.9rem; margin-bottom: 10px; }
  .weak-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.82rem; }
  .weak-item:last-child { border-bottom: none; }
  .weak-item .wi-q { color: var(--text); line-height: 1.5; }
  .weak-item .wi-a { color: var(--green); font-size: 0.78rem; margin-top: 3px; }

  .summary-actions { display: flex; gap: 8px; }
  .summary-actions .btn { flex: 1; font-size: 0.85rem; }

  /* ===== LEVEL UP OVERLAY ===== */
  .lvlup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,10,0.88);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
  }
  .lvlup-box {
    background: var(--panel);
    border: 2px solid var(--gold);
    border-radius: 20px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 0 60px rgba(255,215,0,0.3);
    animation: popIn 0.4s ease;
    max-width: 320px;
    width: 90%;
  }
  @keyframes popIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
  .lvlup-box .lu-emoji { font-size: 4rem; display: block; margin-bottom: 12px; }
  .lvlup-box h2 { font-family: 'Orbitron', sans-serif; color: var(--gold); font-size: 1.6rem; }
  .lvlup-box .lu-rank { color: var(--accent); font-size: 1rem; margin: 8px 0 20px; }
  .lvlup-box .lu-close {
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    color: white;
    padding: 12px 32px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 700;
    font-size: 0.95rem;
    min-height: 44px;
    touch-action: manipulation;
  }

  /* ===== SCREEN CONTROL ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 400px) {
    .menu-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .menu-card { padding: 12px 8px; min-height: 72px; }
    .menu-card .mc-emoji { font-size: 1.5rem; }
    .summary-actions { flex-direction: column; }
    .result-grid { gap: 6px; }
    .btn-start { padding: 16px; font-size: 1rem; }
  }

  @media (max-width: 320px) {
    .stats { gap: 6px; }
    .stat-box .val { font-size: 0.95rem; }
  }
</style>
</head>
<body>

<!-- ===== 状態別 CSS 背景 (全画面) ===== -->
<!-- Veo動画が準備できたら <video autoplay loop muted playsinline> に差し替え -->
<div class="scene-bg state-title" id="sceneBg">
  <div class="scene-bg-overlay"></div>
</div>

<!-- UI オーバーレイ類 -->
<button class="back-btn" id="backBtn" onclick="showMenu()">← メニューに戻る</button>
<button class="mute-btn" id="muteB" onclick="toggleMute()">🔊 音ON</button>
<div class="combo-flash" id="comboFlash"></div>
<div class="lvlup-overlay" id="lvlupOverlay">
  <div class="lvlup-box">
    <span class="lu-emoji">⭐</span>
    <h2>LEVEL UP！</h2>
    <div class="lu-rank" id="luRank">新ランク取得！</div>
    <button class="lu-close" onclick="closeLvlUp()">続ける！</button>
  </div>
</div>

<div class="container">
  <div class="hdr">
    <h1>⚔️ 数学バトル道場</h1>
    <p>中学数学 ｜ 中1〜中2 全分野制覇</p>
  </div>

  <!-- ===== タイトル / メニュー画面 ===== -->
  <div id="menuScreen" class="screen active">


    <div class="menu-hero">
      <h2>数学の力を証明せよ！</h2>
      <p>ボスを倒して全分野を征服しよう</p>
    </div>

    <div class="mode-select">
      <button class="mode-btn active" id="modeAll" onclick="setMode('all')">🎯 全問チャレンジ</button>
      <button class="mode-btn" id="modeWeak" onclick="setMode('weak')">💢 苦手だけ特訓</button>
    </div>

    <div class="menu-grid" id="menuGrid"></div>
    <div class="sel-label" id="selLabel">全分野を選択中</div>
    <button class="btn-start" onclick="startQuiz()">⚔️ バトル開始！</button>
  </div>

  <!-- ===== ゲーム画面 ===== -->
  <div id="quizScreen" class="screen">
    <div class="stats">
      <div class="stat-box stat-xp">
        <div class="label">XP</div>
        <div class="val" id="xpVal">0</div>
      </div>
      <div class="stat-box stat-rank">
        <div class="label">RANK</div>
        <div class="val" id="rankVal">見習い</div>
      </div>
      <div class="stat-box stat-combo">
        <div class="label">COMBO</div>
        <div class="val" id="comboVal">0</div>
      </div>
    </div>

    <div class="xp-bar-wrap">
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
      <div class="xp-bar-label">
        <span id="rankName">計算見習い</span>
        <span id="xpToNext">次まで50XP</span>
      </div>
    </div>

    <div class="boss-area">
      <span class="boss-emoji" id="bossEmoji">🐉</span>
      <div class="boss-name" id="bossName">ボス名</div>
      <div class="boss-desc" id="bossDesc">説明</div>
      <div class="boss-hp-bg"><div class="boss-hp-fill" id="bossHpBar" style="width:100%"></div></div>
      <div class="boss-hp-label">HP: <span id="bossHpNum">0</span> / <span id="bossHpMax">0</span></div>
    </div>

    <div class="prog-wrap">
      <div class="prog-bg"><div class="prog-fill" id="progBar" style="width:0%"></div></div>
      <div class="prog-label"><span id="progLabel">0/0</span></div>
    </div>

    <div class="quiz-area">
      <div class="q-meta">
        <span class="q-cat" id="qCat">分野</span>
        <span class="q-num" id="qNum">1/56</span>
      </div>
      <div class="q-text" id="qText">問題文</div>
      <div class="q-sub" id="qSub"></div>
      <div class="ans-row">
        <input type="text" class="ans-input" id="ansInput"
          placeholder="答えを入力して Enter"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          inputmode="decimal">
        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">決定</button>
      </div>
      <div class="hint-area">
        <button class="hint-btn" onclick="showHint(1)">💡 ヒント1 (-3XP)</button>
        <button class="hint-btn" onclick="showHint(2)">🔍 ヒント2 (-2XP)</button>
      </div>
      <div class="hint-text" id="hint1Text"></div>
      <div class="hint-text" id="hint2Text"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-next" id="nextBtn" onclick="nextQ()" style="display:none">次の問題へ ▶</button>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="summaryScreen" class="screen">
    <div class="summary-box">
      <span class="summary-emoji" id="sumEmoji">🎉</span>
      <div class="summary-score" id="sumScore">0点</div>
      <div class="summary-label" id="sumLabel">クリア！お疲れさまでした</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="ri-val" id="sumXP" style="color:var(--gold)">0</div>
          <div class="ri-label">獲得XP</div>
        </div>
        <div class="result-item">
          <div class="ri-val" id="sumCombo" style="color:var(--accent2)">0</div>
          <div class="ri-label">最大コンボ</div>
        </div>
        <div class="result-item">
          <div class="ri-val" id="sumTime" style="color:var(--accent)">0秒</div>
          <div class="ri-label">タイム</div>
        </div>
      </div>
    </div>

    <div class="weak-list" id="weakList"></div>

    <div class="summary-actions">
      <button class="btn btn-primary" onclick="startReview()">💢 間違い復習</button>
      <button class="btn btn-secondary" onclick="showMenu()">🏠 メニューへ</button>
    </div>
  </div>

</div><!-- /container -->

<script>
// ===== 問題データ (外部JSONから読み込み) =====
var QUESTIONS = [];
// problems.json を非同期ロードしてアプリ初期化
fetch('problems.json')
  .then(function(r){ return r.json(); })
  .then(function(data){
    QUESTIONS = data;
    initApp();
  })
  .catch(function(e){ console.error('problems.json 読み込みエラー:', e); });

// ===== ランク定義 =====
var RANKS = [
  {name:"🔩 計算見習い",   xp:0},
  {name:"📐 数式ルーキー", xp:50},
  {name:"🔢 整数ファイター",xp:150},
  {name:"⚖️ 方程式の剣士", xp:300},
  {name:"📈 関数の探偵",   xp:500},
  {name:"🔷 図形の騎士",   xp:800},
  {name:"🎲 確率の魔術師", xp:1200},
  {name:"🧮 代数のナイト", xp:1800},
  {name:"💡 証明の賢者",   xp:2500},
  {name:"🌀 連立のマスター",xp:3500},
  {name:"⚡ 数学エース",   xp:5000},
  {name:"🔥 方程式キング", xp:7000},
  {name:"🌌 無限の探究者", xp:10000},
  {name:"💫 数学レジェンド",xp:15000},
  {name:"🏆 数学の神",     xp:20000}
];

// ===== ボス定義 =====
var BOSSES = [
  {emoji:"🐊", name:"正負のワニ Lv.1",   desc:"正負の数を守るぬめりワニ！",       hp:8},
  {emoji:"🦊", name:"文字式キツネ Lv.2", desc:"xとyを操る狡猾なキツネ！",         hp:10},
  {emoji:"🐯", name:"方程式タイガー Lv.3",desc:"一次方程式の暴れ虎！",             hp:10},
  {emoji:"🦅", name:"関数イーグル Lv.4", desc:"一次関数を駆る猛禽！",             hp:12},
  {emoji:"🐉", name:"連立ドラゴン Lv.5", desc:"連立方程式の最凶ドラゴン！",       hp:12},
  {emoji:"🤖", name:"数学キング FINAL",  desc:"全分野を統べる最終ボス！",         hp:15}
];

// ===== Web Audio =====
var AC_ = window.AudioContext || window.webkitAudioContext;
var ac_ = null, muted_ = false;
function ia_() { if(!ac_) ac_ = new AC_(); if(ac_.state==='suspended') ac_.resume(); }
function ps_(f,d,tp,v,dl) {
  tp=tp||'sine'; v=v||0.25; dl=dl||0;
  if(muted_||!ac_) return;
  try {
    var o=ac_.createOscillator(), g=ac_.createGain();
    o.connect(g); g.connect(ac_.destination);
    o.type=tp; o.frequency.value=f;
    g.gain.setValueAtTime(v,ac_.currentTime+dl);
    g.gain.exponentialRampToValueAtTime(0.001,ac_.currentTime+dl+d);
    o.start(ac_.currentTime+dl);
    o.stop(ac_.currentTime+dl+d);
  } catch(e) {}
}
function sfxOK()    { ps_(523,0.1); ps_(659,0.18,0,0,0.08); ps_(784,0.25,0,0,0.16); }
function sfxNG()    { ps_(200,0.15,'square',0.12); ps_(150,0.2,'square',0.1,0.1); }
function sfxCombo() { ps_(880,0.1); ps_(1047,0.1,0,0,0.07); ps_(1319,0.15,0,0,0.14); }
function sfxLvl()   { [523,659,784,1047].forEach(function(f,i){ps_(f,0.3,0,0.2,i*0.12);}); }
function sfxBoss()  { [200,250,300,200].forEach(function(f,i){ps_(f,0.3,'sawtooth',0.15,i*0.15);}); }
function sfxBD()    { [784,880,988,1047,1319].forEach(function(f,i){ps_(f,0.35,0,0.2,i*0.1);}); }
function toggleMute() {
  muted_ = !muted_;
  document.getElementById('muteB').textContent = muted_ ? '🔇 音OFF' : '🔊 音ON';
}

// ===== ゲーム状態 =====
var state = {
  xp:0, rank:0, combo:0, maxCombo:0,
  bossIdx:0, bossHp:0, bossMaxHp:0,
  queue:[], cur:0, wrongs:[],
  hint1Used:false, hint2Used:false,
  answered:false, correct:0, total:0,
  mode:'all', selCats:null, isReview:false,
  startTime:0
};

// localStorage キー（汎用版）
var LS_KEY = 'math_battle_dojo_wrongs';

// カテゴリ一覧を動的に生成
var CATS = []; // problems.json読み込み後に設定

// カテゴリ絵文字マップ
var CAT_EMOJI = {
  '正負の数':'±', '文字と式':'🔤', '一次方程式':'⚖️', '比例・反比例':'📈',
  '平面図形':'🔷', '空間図形':'📦', '資料の活用':'📊',
  '式の計算':'✏️', '連立方程式':'🔗', '不等式':'↔️', '一次関数':'📉',
  '平行と合同':'📐', '確率':'🎲', '場合の数':'🔢'
};
function catEmoji(cat) { return CAT_EMOJI[cat] || '📚'; }

// ===== 初期化 =====
function init() {
  var grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  CATS.forEach(function(cat) {
    var cnt = QUESTIONS.filter(function(q){ return q.cat===cat; }).length;
    var div = document.createElement('div');
    div.className = 'menu-card active';
    div.id = 'cat_' + cat;
    div.innerHTML =
      '<div class="mc-emoji">' + catEmoji(cat) + '</div>' +
      '<div class="mc-name">' + cat + '</div>' +
      '<div class="mc-cnt">' + cnt + '問</div>';
    div.onclick = (function(c){ return function(){ toggleCat(c); }; })(cat);
    grid.appendChild(div);
  });
  state.selCats = new Set(CATS);
}

function toggleCat(cat) {
  var el = document.getElementById('cat_' + cat);
  if(state.selCats.has(cat)) {
    state.selCats.delete(cat);
    el.classList.remove('active');
  } else {
    state.selCats.add(cat);
    el.classList.add('active');
  }
  updateSelLabel();
}

function updateSelLabel() {
  var n = state.selCats.size;
  document.getElementById('selLabel').textContent =
    n === CATS.length ? '全分野を選択中' : n + '分野を選択中';
}

function setMode(m) {
  state.mode = m;
  document.getElementById('modeAll').classList.toggle('active', m==='all');
  document.getElementById('modeWeak').classList.toggle('active', m==='weak');
}

function shuffle(arr) {
  var a = arr.slice();
  for(var i=a.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i]=a[j]; a[j]=t;
  }
  return a;
}

// ===== ゲーム開始 =====
function startQuiz() {
  ia_();
  var pool;
  if(state.mode === 'weak') {
    pool = getWeakQ();
    if(!pool.length) { alert('まだ間違えた問題がありません！'); return; }
  } else {
    pool = QUESTIONS.filter(function(q){ return state.selCats.has(q.cat); });
    if(!pool.length) { alert('分野を1つ以上選んでください。'); return; }
  }
  state.queue = shuffle(pool);
  state.cur=0; state.wrongs=[]; state.correct=0; state.total=state.queue.length;
  state.answered=false; state.isReview=false;
  state.combo=0; state.maxCombo=0;
  state.startTime = Date.now();
  state.bossIdx = 0;
  loadBoss(0);
  showScreen('quizScreen');
  switchBgVideo('quiz');
  renderQ();
}

// 苦手問題取得
function getWeakQ() {
  var saved = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  return QUESTIONS.filter(function(q){ return saved.indexOf(q.id) !== -1; });
}
function saveWrongs(wrongs) {
  var saved = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  wrongs.forEach(function(q){ if(saved.indexOf(q.id)===-1) saved.push(q.id); });
  localStorage.setItem(LS_KEY, JSON.stringify(saved));
}
function clearWrong(id) {
  var saved = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
  saved = saved.filter(function(x){ return x!==id; });
  localStorage.setItem(LS_KEY, JSON.stringify(saved));
}

// ===== ボス管理 =====
function loadBoss(idx) {
  if(idx >= BOSSES.length) idx = BOSSES.length - 1;
  var b = BOSSES[idx];
  state.bossIdx = idx;
  state.bossHp = b.hp; state.bossMaxHp = b.hp;
  document.getElementById('bossEmoji').textContent = b.emoji;
  document.getElementById('bossName').textContent  = b.name;
  document.getElementById('bossDesc').textContent  = b.desc;
  updateBossHp();
  sfxBoss();
}
function updateBossHp() {
  var pct = Math.max(0, state.bossHp / state.bossMaxHp * 100);
  document.getElementById('bossHpBar').style.width = pct + '%';
  document.getElementById('bossHpNum').textContent = state.bossHp;
  document.getElementById('bossHpMax').textContent = state.bossMaxHp;
}

// ===== 問題表示 =====
function renderQ() {
  if(state.cur >= state.queue.length) { finishQuiz(); return; }
  var q = state.queue[state.cur];
  state.answered=false; state.hint1Used=false; state.hint2Used=false;

  document.getElementById('qCat').textContent   = catEmoji(q.cat) + ' ' + q.cat;
  document.getElementById('qNum').textContent   = (state.cur+1) + '/' + state.total;
  document.getElementById('qText').textContent  = q.q;
  document.getElementById('qSub').textContent   = q.gr + ' レベル';
  var inp = document.getElementById('ansInput');
  inp.value=''; inp.className='ans-input'; inp.disabled=false;
  document.getElementById('checkBtn').style.display='';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('hint1Text').className='hint-text';
  document.getElementById('hint2Text').className='hint-text';

  var prog = (state.cur / state.total) * 100;
  document.getElementById('progBar').style.width = prog + '%';
  document.getElementById('progLabel').textContent = state.cur + '/' + state.total;

  setTimeout(function(){ document.getElementById('ansInput').focus(); }, 100);
}

// ===== 答え合わせ =====
function normalizeAns(s) {
  return s.trim()
    .replace(/\s+/g,'')
    .replace(/＝/g,'=')
    .replace(/，/g,',')
    .replace(/　/g,'')
    .toLowerCase();
}

function checkAnswer() {
  ia_();
  if(state.answered) return;
  var q = state.queue[state.cur];
  var userAns    = normalizeAns(document.getElementById('ansInput').value);
  var correctAns = normalizeAns(q.a);
  var correct    = (userAns === correctAns);

  state.answered = true;
  document.getElementById('ansInput').disabled = true;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display  = 'block';

  if(correct) {
    sfxOK();
    switchBgVideo('correct');
    document.getElementById('ansInput').classList.add('ok');
    state.correct++;
    state.combo++;
    if(state.combo > state.maxCombo) state.maxCombo = state.combo;

    var xpGain = 10;
    if(!state.hint1Used && !state.hint2Used) xpGain += 5; // ノーヒントボーナス
    if(state.combo >= 5)  xpGain += 5;
    if(state.combo >= 10) { xpGain += 5; sfxCombo(); }
    if(state.combo >= 3)  showComboFlash('🔥 ' + state.combo + ' COMBO!');

    addXP(xpGain);
    clearWrong(q.id);

    // ボスダメージ
    state.bossHp = Math.max(0, state.bossHp - 1);
    updateBossHp();
    if(state.bossHp <= 0) {
      sfxBD();
      switchBgVideo('clear');
      var defeated = BOSSES[state.bossIdx];
      setTimeout(function(){
        showComboFlash('💥 ' + defeated.emoji + ' 撃破！');
        var nextIdx = state.bossIdx + 1;
        if(nextIdx < BOSSES.length) {
          setTimeout(function(){ loadBoss(nextIdx); switchBgVideo('quiz'); }, 1800);
        }
      }, 300);
    }

    var fb = document.getElementById('feedback');
    fb.className = 'feedback ok';
    fb.innerHTML =
      '<strong>✅ 正解！ +' + xpGain + 'XP</strong>' +
      (state.combo >= 2 ? ' <span style="color:var(--gold)">' + state.combo + 'コンボ！</span>' : '') +
      '<div class="exp">📖 ' + q.exp + '</div>';
  } else {
    sfxNG();
    switchBgVideo('wrong');
    document.getElementById('ansInput').classList.add('ng');
    state.combo = 0;
    state.wrongs.push(q);
    saveWrongs([q]);

    var fb2 = document.getElementById('feedback');
    fb2.className = 'feedback ng';
    fb2.innerHTML =
      '<strong>❌ 不正解… 正解: <span style="color:var(--green)">' + q.a + '</span></strong>' +
      '<div class="exp">📖 ' + q.exp + '</div>';
  }

  document.getElementById('comboVal').textContent = state.combo;
  document.getElementById('xpVal').textContent    = state.xp;
}

function showComboFlash(txt) {
  var el = document.getElementById('comboFlash');
  el.textContent = txt;
  el.style.animation = 'none';
  void el.offsetWidth; // reflow
  el.style.animation = 'comboAnim 1s ease forwards';
}

function nextQ() { switchBgVideo('quiz'); state.cur++; renderQ(); }

// ===== XP & ランク =====
function addXP(n) {
  var prevRank = state.rank;
  state.xp += n;
  var newRank = 0;
  for(var i=RANKS.length-1; i>=0; i--) {
    if(state.xp >= RANKS[i].xp) { newRank=i; break; }
  }
  state.rank = newRank;
  if(newRank > prevRank) {
    sfxLvl();
    document.getElementById('luRank').textContent = RANKS[newRank].name;
    document.getElementById('lvlupOverlay').style.display = 'flex';
  }
  updateRankUI();
}

function updateRankUI() {
  var cur  = RANKS[state.rank];
  var next = state.rank < RANKS.length-1 ? RANKS[state.rank+1] : null;
  document.getElementById('rankVal').textContent  = cur.name;
  document.getElementById('rankName').textContent = cur.name;
  document.getElementById('xpVal').textContent    = state.xp;
  var pct = next ? Math.min(100, (state.xp-cur.xp)/(next.xp-cur.xp)*100) : 100;
  document.getElementById('xpBar').style.width    = pct + '%';
  document.getElementById('xpToNext').textContent = next ? (next.xp-state.xp)+' XPで昇格' : 'MAX RANK';
}

function closeLvlUp() { document.getElementById('lvlupOverlay').style.display='none'; }

// ===== ヒント =====
function showHint(n) {
  ia_();
  var q = state.queue[state.cur];
  if(n===1 && !state.hint1Used) {
    state.hint1Used = true;
    state.xp = Math.max(0, state.xp-3);
    document.getElementById('hint1Text').textContent = '💡 ' + q.h1;
    document.getElementById('hint1Text').classList.add('show');
    updateRankUI();
  } else if(n===2 && !state.hint2Used) {
    state.hint2Used = true;
    state.xp = Math.max(0, state.xp-2);
    document.getElementById('hint2Text').textContent = '🔍 ' + q.h2;
    document.getElementById('hint2Text').classList.add('show');
    updateRankUI();
  }
}

// ===== 結果画面 =====
function finishQuiz() {
  var elapsed = Math.round((Date.now() - state.startTime) / 1000);
  var pct     = Math.round(state.correct / state.total * 100);

  // 絵文字・ラベルを成績に合わせて変更
  var emoji = pct===100 ? '🏆' : pct>=80 ? '🎉' : pct>=60 ? '😊' : '💪';
  var label = pct===100 ? 'パーフェクト！素晴らしい！' : pct>=80 ? 'クリア！よく頑張った！' : 'クリア！お疲れさまでした';

  document.getElementById('sumEmoji').textContent  = emoji;
  document.getElementById('sumScore').textContent  = pct + '点';
  document.getElementById('sumLabel').textContent  = label;
  document.getElementById('sumXP').textContent     = state.xp;
  document.getElementById('sumCombo').textContent  = state.maxCombo;
  document.getElementById('sumTime').textContent   = elapsed + '秒';

  var wl = document.getElementById('weakList');
  if(state.wrongs.length) {
    wl.innerHTML = '<h3 style="color:var(--accent2)">🔴 間違えた問題 (' + state.wrongs.length + '問)</h3>';
    state.wrongs.forEach(function(q) {
      var d = document.createElement('div');
      d.className = 'weak-item';
      var qText = q.q.replace(/\n/g,' ');
      if(qText.length>45) qText = qText.substring(0,45)+'…';
      d.innerHTML =
        '<div class="wi-q">' + q.cat + '：' + qText + '</div>' +
        '<div class="wi-a">正解: ' + q.a + '</div>';
      wl.appendChild(d);
    });
  } else {
    wl.innerHTML = '<h3 style="color:var(--green)">🎉 全問正解！パーフェクト！</h3>';
  }
  showScreen('summaryScreen');
  switchBgVideo('clear');
}

// 間違い復習
function startReview() {
  if(!state.wrongs.length) { alert('間違えた問題がありません！'); return; }
  state.queue = shuffle(state.wrongs);
  state.cur=0; state.correct=0; state.total=state.queue.length;
  state.answered=false; state.isReview=true;
  state.combo=0; state.maxCombo=0;
  state.startTime = Date.now();
  loadBoss(state.bossIdx);
  showScreen('quizScreen');
  switchBgVideo('quiz');
  renderQ();
}

function showMenu() { showScreen('menuScreen'); switchBgVideo('title'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  var backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.style.display = (id === 'quizScreen') ? 'block' : 'none';
}

// ===== キーボード操作 =====
document.addEventListener('keydown', function(e) {
  if(e.key === 'Enter') {
    if(!state.answered) {
      checkAnswer();
    } else if(document.getElementById('nextBtn').style.display !== 'none') {
      nextQ();
    }
  }
  // Escape でレベルアップ画面を閉じる
  if(e.key === 'Escape') {
    if(document.getElementById('lvlupOverlay').style.display === 'flex') closeLvlUp();
  }
});

// ===== 背景ステート切り替え（CSS グラデーション）=====
// Veo動画が準備できたら <video> 差し替えに対応予定
var _curBgState = '';
var BG_STATES = ['title', 'quiz', 'correct', 'wrong', 'clear'];
function switchBgVideo(stateName) {
  if (_curBgState === stateName) return;
  if (BG_STATES.indexOf(stateName) === -1) return;
  _curBgState = stateName;
  var el = document.getElementById('sceneBg');
  if (!el) return;
  BG_STATES.forEach(function(s) { el.classList.remove('state-' + s); });
  el.classList.add('state-' + stateName);
}

// ===== アプリ初期化（problems.json読み込み後に呼ばれる） =====
function initApp() {
  var seen = {}, result = [];
  QUESTIONS.forEach(function(q) { if(!seen[q.cat]) { seen[q.cat]=1; result.push(q.cat); } });
  CATS = result;
  init();
  updateRankUI();
  switchBgVideo('title');
}

</script>
